# Reusable test-coverage (covr) workflow for PredictiveEcology R packages.
#
# Call it from a package repo (which owns the triggers), e.g.:
#
#   name: test-coverage
#   on:
#     push: { branches: [main, development] }
#     pull_request: { branches: [main, development] }
#   jobs:
#     test-coverage:
#       uses: PredictiveEcology/actions/.github/workflows/test-coverage.yaml@v0
#       secrets: inherit
#       with:
#         extra-packages: |
#           PredictiveEcology/Require@development
name: test-coverage

on:
  workflow_call:
    inputs:
      extra-packages:
        description: "Packages appended to setup-r-dependencies `extra-packages` (newline-separated)."
        type: string
        default: ""
      post-install:
        description: "Optional Rscript run after dependency install (e.g. NLMR/fastshp)."
        type: string
        default: ""
      dependencies:
        description: "R expression for setup-r-dependencies' `dependencies` input. Use NA when transitive Suggests resolution conflicts (then add the needed Suggests directly via extra-packages)."
        type: string
        default: '"all"'

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      GOOGLEDRIVE_AUTH: ${{ secrets.GOOGLEDRIVE_AUTH }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      USING_COVR: true
      NOT_CRAN: "true"

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      # Stock Noble apt (replicates reproducible). The ubuntugis-unstable PPA
      # used by install-spatial-deps installs libgdal37, which is ABI-incompatible
      # with the binaries in Posit's noble cache and breaks geospatial loads.
      - name: Install spatial deps (Linux, stock Noble)
        run: |
          sudo apt-get update -y
          sudo apt-get install -f -y || true
          sudo apt-get install -y --fix-missing \
            libudunits2-dev libgdal-dev libgeos-dev libproj-dev libsqlite3-dev
        shell: bash

      - uses: r-lib/actions/setup-r@v2
        with:
          extra-repositories: 'https://PredictiveEcology.r-universe.dev/'
          Ncpus: 2
          # Match R-CMD-check / pkgdown: RSPM noble binaries are built against
          # stock libgdal34 (matches the apt step); r-universe terra is libgdal37.
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: ${{ inputs.dependencies }}
          extra-packages: |
            any::covr
            ${{ inputs.extra-packages }}

      - name: Install additional package dependencies
        if: ${{ inputs.post-install != '' }}
        run: ${{ inputs.post-install }}
        shell: Rscript {0}

      - name: Test coverage
        # Wraps covr::merge_coverage.character to skip unreadable per-test trace
        # files (zero-byte or truncated RDS) instead of aborting with the cryptic
        # `Error in readRDS(f) : error reading from connection`. Root cause: a
        # test that spawns a subprocess (e.g. callr::r_bg) sometimes leaves a
        # child alive that the session can't terminate ("Error while shutting
        # down parallel: unable to terminate some child processes"); that
        # orphan's covr trace file is created but never flushed. Skipping it
        # loses only the orphan's coverage and lets the rest report normally.
        # The skip is logged with the file path and size so a real corruption
        # (vs. a benign orphan) is still visible.
        run: |
          ns <- asNamespace("covr")
          orig <- get("merge_coverage.character", envir = ns, inherits = FALSE)
          wrapped <- function(x, ...) {
            readable <- vapply(x, function(f) {
              if (!file.exists(f) || !isTRUE(file.size(f) > 0)) return(FALSE)
              isTRUE(tryCatch({ readRDS(f); TRUE }, error = function(e) FALSE))
            }, logical(1))
            skipped <- x[!readable]
            if (length(skipped)) {
              message("test-coverage: skipping ", length(skipped),
                      " unreadable covr trace file(s) (likely from a child ",
                      "process that didn't flush; see workflow comment):")
              for (f in skipped) {
                sz <- if (file.exists(f)) file.size(f) else NA_integer_
                message(sprintf("  [%s bytes] %s", format(sz), f))
              }
            }
            orig(x[readable], ...)
          }
          unlockBinding("merge_coverage.character", ns)
          assign("merge_coverage.character", wrapped, envir = ns)
          lockBinding("merge_coverage.character", ns)

          covr::codecov(quiet = FALSE)
        shell: Rscript {0}
